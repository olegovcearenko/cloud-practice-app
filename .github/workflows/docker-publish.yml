name: Docker Build and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/olegovcearenko/cloud-practice-backend:latest ./backend
          docker build -t ghcr.io/olegovcearenko/cloud-practice-backend:${{ github.sha }} ./backend

      - name: Push Docker image
        run: |
          docker push ghcr.io/olegovcearenko/cloud-practice-backend:latest
          docker push ghcr.io/olegovcearenko/cloud-practice-backend:${{ github.sha }}